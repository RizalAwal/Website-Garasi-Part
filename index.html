<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GARASI PART — Solusi Suku Cadang Otomotif</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* RESET & VARIABLES */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #161616;
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --text: #e8e4dc;
      --muted: #666;
    }

    /* THEME CONFIGURATIONS */
    body.theme-christmas { --bg: #0a1a12; --gold: #d42426; --gold-light: #ff4d4d; }
    body.theme-ramadhan { --bg: #06140a; --gold: #39e75f; --gold-light: #f1c40f; }
    body.theme-imlek { --bg: #1a0505; --gold: #ee1c25; --gold-light: #ffcc00; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
      transition: background 0.8s ease;
    }

    /* CUSTOM CURSOR */
    .cursor { position: fixed; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
    .cursor-trail { position: fixed; width: 36px; height: 36px; border: 1px solid var(--gold); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); opacity: 0.4; }

    /* NAVIGATION */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 4rem; background: linear-gradient(to bottom, var(--bg), transparent); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 0.15em; color: var(--gold); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.3s; }

    /* HERO SECTION */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 4rem;
      position: relative;
      background: radial-gradient(circle at 70% 30%, rgba(201,168,76,0.08) 0%, transparent 60%);
      overflow: hidden;
    }
    .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; line-height: 0.95; margin-bottom: 2rem; z-index: 5; position: relative; }
    .hero-title em { font-style: italic; color: var(--gold); transition: color 0.5s; }
    .hero-sub { max-width: 500px; font-size: 1rem; line-height: 1.75; color: var(--muted); margin-bottom: 3rem; z-index: 5; position: relative; }

    /* --- DECORATIONS LOGIC --- */
    .event-decoration { position: absolute; inset: 0; pointer-events: none; z-index: 2; display: none; }

    /* 1. CHRISTMAS: Santa & Moon */
    body.theme-christmas #christmas-decor { display: block; }
    .moon { position: absolute; top: 15%; right: 15%; width: 150px; height: 150px; background: #fefcd7; border-radius: 50%; box-shadow: 0 0 80px rgba(254, 252, 215, 0.4); }
    .santa-fly {
      position: absolute;
      top: 25%;
      width: 250px;
      height: 100px;
      background: url('https://www.svgrepo.com/show/305467/santa-claus-sleigh.svg') no-repeat center;
      background-size: contain;
      filter: brightness(0) invert(1);
      animation: flyAround 15s linear infinite;
    }

    /* 2. RAMADHAN: Camel & Palm Tree */
    body.theme-ramadhan #ramadhan-decor { display: block; }
    .palm-tree { position: absolute; bottom: 0; right: 10%; width: 200px; height: 300px; background: url('https://www.svgrepo.com/show/489849/palm-tree.svg') no-repeat center; background-size: contain; filter: brightness(0) invert(1) opacity(0.2); animation: sway 8s ease-in-out infinite; }
    .camel { position: absolute; bottom: 50px; right: 18%; width: 120px; height: 100px; background: url('https://www.svgrepo.com/show/247181/camel-middle-east.svg') no-repeat center; background-size: contain; filter: brightness(0) invert(1) opacity(0.3); animation: walk 12s ease-in-out infinite; }

    /* 3. IMLEK: Dragon Silhouette */
    body.theme-imlek #imlek-decor { display: block; }
    .dragon {
      position: absolute;
      top: 40%;
      left: -20%;
      width: 400px;
      height: 200px;
      background: url('https://www.svgrepo.com/show/104192/dragon.svg') no-repeat center;
      background-size: contain;
      filter: brightness(0) invert(1) sepia(1) saturate(10000%) hue-rotate(-10deg); /* Membuat Naga jadi Merah */
      opacity: 0.5;
      animation: dragonMove 20s linear infinite;
    }

    /* ANIMATIONS */
    @keyframes flyAround { from { left: 110%; transform: translateY(0); } to { left: -30%; transform: translateY(-50px); } }
    @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    @keyframes walk { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-50px); } }
    @keyframes dragonMove { 0% { left: -30%; transform: translateY(0); } 50% { transform: translateY(-100px); } 100% { left: 110%; transform: translateY(0); } }

    /* THEME PANEL */
    .theme-panel { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 50px; backdrop-filter: blur(10px); }
    .theme-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; }

    footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 3rem; text-align: center; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body id="body">

  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <div class="theme-panel">
    <button class="theme-btn" style="background:#c9a84c" onclick="setTheme('default')">⚙</button>
    <button class="theme-btn" style="background:#d42426" onclick="setTheme('christmas')">❄</button>
    <button class="theme-btn" style="background:#39e75f" onclick="setTheme('ramadhan')">🌙</button>
    <button class="theme-btn" style="background:#ee1c25" onclick="setTheme('imlek')">🏮</button>
  </div>

  <nav>
    <div class="nav-logo">GARASI PART</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Product</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
  </nav>

  <section class="hero">
    <!-- Dekorasi Natal -->
    <div id="christmas-decor" class="event-decoration">
      <div class="moon"></div>
      <div class="santa-fly"></div>
    </div>

    <!-- Dekorasi Ramadhan -->
    <div id="ramadhan-decor" class="event-decoration">
      <div class="palm-tree"></div>
      <div class="camel"></div>
    </div>

    <!-- Dekorasi Imlek -->
    <div id="imlek-decor" class="event-decoration">
      <div class="dragon"></div>
    </div>

    <p style="color:var(--gold); letter-spacing:0.3em; text-transform:uppercase; font-size:0.7rem; margin-bottom:1.5rem; z-index:5;">✦ Premium Automotive Parts</p>
    <h1 class="hero-title">Performa Maksimal<br>Untuk <em id="event-text">Kendaraan</em> Anda.</h1>
    <p class="hero-sub">Pusat penyedia suku cadang original berkualitas tinggi untuk keamanan dan kenyamanan berkendara yang tak tertandingi.</p>
  </section>

  <footer>
    <p>&copy; 2026 Rizal Kusuma (1324001). All Rights Reserved.</p>
  </footer>

  <script>
    function setTheme(theme) {
      const body = document.getElementById('body');
      const eventText = document.getElementById('event-text');
      body.classList.remove('theme-christmas', 'theme-ramadhan', 'theme-imlek');
      
      if (theme === 'christmas') {
        body.classList.add('theme-christmas');
        eventText.innerText = "Natal & Tahun Baru";
      } else if (theme === 'ramadhan') {
        body.classList.add('theme-ramadhan');
        eventText.innerText = "Bulan Suci";
      } else if (theme === 'imlek') {
        body.classList.add('theme-imlek');
        eventText.innerText = "Tahun Baru Imlek";
      } else {
        eventText.innerText = "Kendaraan";
      }
    }

    // Cursor Movement
    const cursor = document.getElementById('cursor');
    const trail = document.getElementById('cursorTrail');
    let mx = 0, my = 0, tx = 0, ty = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
    });

    function animateTrail() {
      tx += (mx - tx) * 0.1; ty += (my - ty) * 0.1;
      trail.style.left = tx + 'px'; trail.style.top = ty + 'px';
      requestAnimationFrame(animateTrail);
    }
    animateTrail();
  </script>
</body>
</html>
